dataset:
  name: glove
  config:
    dim: 50
    max_vectors: ${max_vectors:5000}$

model:
  name: rqvae
  config:
    latent_dim: 16
    reconstruction_loss: mse
    codebook_size: 128
    commitment_weight: 0.25
    codebook_weight: 1.0
    assignment_strategy: sinkhorn
    sinkhorn_epsilon: [0.0, 0.0, 0.0, 0.003]
    sinkhorn_iters: 50
    kmeans_init: true
    kmeans_iters: 20
    use_ema_codebook: false
    dead_code_reset: false
    num_quantizers: 4

encoder:
  name: mlp
  config:
    hidden_dims: [256, 128, 64]
    activation: relu
    use_bias: true
    dropout: ${dropout:0.1}$
    norm: ${norm:layernorm}$
    weight_init: ${init:xavier_normal}$

decoder:
  name: mlp
  config:
    hidden_dims: [128, 256, 50]
    activation: relu
    use_bias: true
    dropout: ${dropout:0.1}$
    norm: ${norm:layernorm}$
    weight_init: ${init:xavier_normal}$

trainer:
  output_dir: artifacts/glove/rqvae-stronger
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch:20}$
  batch_size: 256
  learning_rate: ${lr:0.0005}$
  optimizer_name: ${optimizer:adamw}$
  weight_decay: ${wd:0.02}$
  lr_scheduler_type: ${schedule:cosine}$
  warmup_epochs: ${warmup:2}$
  grad_clip_norm: ${clip:1.0}$
  device: cpu
  show_only_best_epochs: true
  advice: false
