dataset:
  name: glove
  config:
    dim: 50
    max_vectors: ${max_vectors:5000}$

model:
  name: betatcvae
  config:
    latent_dim: 16
    reconstruction_loss: mse
    kl_weight: 1.0
    free_bits: 0.02
    kl_warmup_epochs: 20
    kl_start_weight: 0.0
    use_mean_in_eval: true
    mutual_information_weight: 1.0
    total_correlation_weight: 6.0
    dimension_wise_kl_weight: 1.0

encoder:
  name: mlp
  config:
    hidden_dims: [64, 32]
    activation: relu
    use_bias: true

decoder:
  name: mlp
  config:
    hidden_dims: [64, 50]
    activation: relu
    use_bias: true

trainer:
  output_dir: artifacts/glove/betatcvae
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch:5}$
  batch_size: 128
  learning_rate: ${lr:0.001}$
  optimizer_name: ${optimizer:adamw}$
  weight_decay: ${wd:0.01}$
  lr_scheduler_type: ${schedule:linear}$
  warmup_epochs: ${warmup:1}$
  grad_clip_norm: ${clip:1.0}$
  device: auto
  show_only_best_epochs: true
  advice: false
