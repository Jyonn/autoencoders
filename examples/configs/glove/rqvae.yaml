dataset:
  name: glove
  config:
    dim: 50
    max_vectors: ${max_vectors:5000}$

model:
  name: rqvae
  config:
    latent_dim: 16
    reconstruction_loss: mse
    codebook_size: 64
    commitment_weight: 0.25
    codebook_weight: 1.0
    use_ema_codebook: true
    ema_decay: 0.99
    ema_epsilon: 0.00001
    dead_code_reset: true
    dead_code_threshold: 0
    num_quantizers: 4

encoder:
  name: mlp
  config:
    hidden_dims: [64, 32]
    activation: relu
    use_bias: true

decoder:
  name: mlp
  config:
    hidden_dims: [64, 50]
    activation: relu
    use_bias: true

trainer:
  output_dir: artifacts/glove/rqvae
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch:5}$
  batch_size: 128
  learning_rate: ${lr:0.001}$
  optimizer_name: ${optimizer:adamw}$
  weight_decay: ${wd:0.01}$
  lr_scheduler_type: ${schedule:linear}$
  warmup_epochs: ${warmup:1}$
  grad_clip_norm: ${clip:1.0}$
  device: auto
  show_only_best_epochs: true
  advice: false
