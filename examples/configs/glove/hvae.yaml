dataset:
  name: glove
  config:
    dim: 50
    max_vectors: ${max_vectors:5000}$

model:
  name: hvae
  config:
    latent_dim: 16
    top_latent_dim: 8
    reconstruction_loss: mse
    kl_weight: 1.0
    free_bits: 0.02
    kl_warmup_epochs: 20
    kl_start_weight: 0.0
    use_mean_in_eval: true

encoder:
  name: mlp
  config:
    hidden_dims: [64, 32]
    activation: relu
    use_bias: true

decoder:
  name: mlp
  config:
    hidden_dims: [64, 50]
    activation: relu
    use_bias: true

trainer:
  output_dir: artifacts/glove/hvae
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch:5}$
  batch_size: 128
  learning_rate: ${lr:0.001}$
  device: auto
  show_only_best_epochs: true
  advice: false
