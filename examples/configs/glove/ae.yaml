dataset:
  name: glove
  config:
    dim: 50
    max_vectors: ${max_vectors:5000}$

model:
  name: ae
  config:
    latent_dim: 16
    reconstruction_loss: mse

encoder:
  name: mlp
  config:
    hidden_dims: [64, 32]
    activation: relu
    use_bias: true

decoder:
  name: mlp
  config:
    hidden_dims: [64, 50]
    activation: relu
    use_bias: true

trainer:
  output_dir: artifacts/glove/ae
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch:5}$
  batch_size: 128
  learning_rate: ${lr:0.001}$
  device: auto
  show_only_best_epochs: true
  advice: false
