dataset:
  name: glove
  config:
    dim: 50
    max_vectors: 5000

model:
  name: rfsq
  config:
    latent_dim: 16
    reconstruction_loss: mse
    num_levels: 8
    commitment_weight: 0.25
    quantization_bound: 1.0
    num_quantizers: 2

encoder:
  name: mlp
  config:
    hidden_dims: [64, 32]
    activation: relu
    use_bias: true

decoder:
  name: mlp
  config:
    hidden_dims: [64, 50]
    activation: relu
    use_bias: true

trainer:
  output_dir: artifacts/glove/rfsq
  validation_ratio: 0.1
  test_ratio: 0.1
  seed: 42
  epochs: ${epoch}$
  batch_size: 128
  learning_rate: 0.001
  device: auto
  show_only_best_epochs: true
  advice: false
