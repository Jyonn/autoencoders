site_name: autoencoders
site_description: Documentation for the autoencoders latent-model toolkit
repo_url: https://github.com/Jyonn/autoencoders
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Datasets: datasets.md
  - Backbones: backbones.md
  - Training: training.md
  - Models:
      - Overview: models/index.md
      - Deterministic AE Family: models/deterministic.md
      - Variational Family: models/variational.md
      - Quantized Family: models/quantized.md
  - Positioning: positioning.md
